spring.application.name=NexChat

# Server Configuration
# Render will automatically provide the PORT variable
server.port=${PORT:8080}

# Security - JWT Secret
# Do not hardcode the key here; set it in the Render Dashboard
nexchat.jwt.secret=${JWT_SECRET}

# Database Configuration (Neon)
# These variables will be pulled from your Render Environment settings
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging Configuration
# Set to INFO for production to keep logs clean and fast
logging.level.org.springframework.security=INFO
logging.level.org.springframework.messaging=INFO
logging.level.org.springframework.web.socket=INFO