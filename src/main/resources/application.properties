spring.application.name=NexChat
# Server Configuration
server.port=${PORT:8080}



# Security - JWT Secret
nexchat.jwt.secret=${JWT_SECRET}
nexchat.jwt.expirationMs=900000
nexchat.jwt.refreshExpirationMs=604800000


# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Logging Configuration
# Set to INFO for production to keep logs clean and fast
logging.level.org.springframework.security=INFO
logging.level.org.springframework.messaging=INFO
logging.level.org.springframework.web.socket=INFO


# Brevo SMTP Configuration
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=a90141001@smtp-brevo.com

spring.mail.password=${EMAIL_KEY}


# Security Settings
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true


#Actuator Health check

management.endpoints.web.exposure.include=health

management.endpoint.health.show-details=always


#GEMINI
gemini.api-key=${GEMINI_API_KEY}
gemini.model=gemini-3.1-flash-lite
gemini.endpoint=https://generativelanguage.googleapis.com/v1beta/models

rate-limit.summarize.capacity=5
rate-limit.summarize.refill-tokens=5
rate-limit.summarize.refill-period-hours=1

chat.summary-message-count=50