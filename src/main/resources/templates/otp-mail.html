<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #0f172a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
    <tr>
        <td align="center" style="padding: 40px 0;">
            <table role="presentation" width="400" cellspacing="0" cellpadding="0" border="0"
                   style="background-color: #1e293b; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">

                <tr>
                    <td align="center" style="padding: 30px 40px 10px 40px;">
                        <h1 style="margin: 0; color: #38bdf8; font-size: 28px; font-weight: 800; letter-spacing: -1px;">
                            Nex<span style="color: #ffffff;">Chat</span>
                        </h1>
                    </td>
                </tr>

                <tr>
                    <td style="padding: 20px 40px; text-align: center; color: #94a3b8;">
                        <p style="margin: 0; font-size: 16px; line-height: 1.5;">
                            Hello! Please use the verification code below to complete your registration.
                        </p>
                    </td>
                </tr>

                <tr>
                    <td align="center" style="padding: 20px 40px;">
                        <div style="background-color: #0f172a; border-radius: 12px; padding: 20px; border: 1px dashed #38bdf8;">
                                <span th:text="${otp}" style="font-size: 36px; font-weight: bold; color: #ffffff; letter-spacing: 8px;">
                                    123456
                                </span>
                        </div>
                    </td>
                </tr>

                <tr>
                    <td style="padding: 10px 40px 40px 40px; text-align: center;">
                        <p style="margin: 0; font-size: 13px; color: #64748b;">
                            This code will expire in <strong style="color: #cbd5e1;">5 minutes</strong>.<br>
                            If you didn't request this, you can safely ignore this email.
                        </p>
                    </td>
                </tr>

            </table>

            <table role="presentation" width="400" cellspacing="0" cellpadding="0" border="0">
                <tr>
                    <td style="padding: 20px; text-align: center;">
                        <p style="margin: 0; font-size: 12px; color: #475569;">
                            &copy; 2026 NexChat App. Built with ❤️ by Krishna.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
